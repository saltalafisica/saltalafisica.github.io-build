name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - master # your Hugo source branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Hugo
      - name: Install Hugo
        run: |
          HUGO_VERSION=0.116.1
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.deb
          sudo dpkg -i hugo_extended_${HUGO_VERSION}_Linux-64bit.deb
          hugo version

      # 3. Build Hugo site
      - name: Build Hugo site
        run: hugo --minify

      # 4. Deploy only generated site to root of master
      - name: Deploy generated site
        run: |
          TMP_DIR=$(mktemp -d)

          # Clone repo into temporary directory
          git clone --depth=1 "https://github.com/${{ github.repository }}.git" $TMP_DIR
          cd $TMP_DIR

          # Remove everything except .git (keeps repo clean)
          git rm -rf .

          # Copy generated files from workflow's public folder
          cp -r $GITHUB_WORKSPACE/public/* ./

          # Commit and push deployment
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          git commit -m "Deploy Hugo site [skip ci]" || echo "No changes to commit"
          git push origin master
