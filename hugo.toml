    identifier = "menu.quienessomos"
    url        = "/quienessomos/"
    weight     = 5

[[menu.main]]
    name       = "Prensa"
    identifier = "menu.prensa"
    url        = "/prensa/"
    weight     = 5

[[menu.main]]
    name       = "Blog"
    identifier = "menu.blog"
    url        = "/blog/"
    weight     = 5

[[menu.main]]
    name       = "FAQ"
    identifier = "menu.faq"
    url        = "/faq/"
    weight     = 6

[[menu.main]]
    identifier = "contact"
    name       = "Contacto"
    url        = "/contact/"
